\* Necessity proof for Phase 4: same scenario, but the strict nonce check
\* `nonce == game.nonce + 1` is REMOVED (EnforceNonce = FALSE).
\* RESULT: ChainLinearizable is VIOLATED. This shows the NONCE check -- not
\* parent_nonce -- is what makes the chain linearizable. parent_nonce is
\* defense-in-depth against client races, not the core guarantee.
SPECIFICATION Spec

CONSTANTS
    Agents      = {A, B}
    MaxNonce    = 3
    MaxContent  = 2
    Byzantine   = {A}
    SubmitCap   = 5
    EnforceNonce = FALSE

INVARIANT TypeOK
INVARIANT ChainLinearizable
