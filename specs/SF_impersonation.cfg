\* Scope-completion: the ON-CHAIN authorization backstop.
\* An outsider E (no registered session key) races honest players A, B to settle
\* moves on Solana, including forged ones, with a reordering mempool.
\* Models record_move's session_delegation roster check (EnforceAuth = TRUE).
\* RESULT: OnlyAuthorizedCommitted holds — E's transactions are NEVER committed,
\* even when their nonce is otherwise valid. This is the property the README's
\* Finding 3 calls "the backstop": an accepted-but-forged P2P move cannot settle.
SPECIFICATION Spec

CONSTANTS
    Agents      = {A, B}
    Outsiders   = {E}
    Authorized  = {A, B}
    MaxNonce    = 3
    MaxContent  = 2
    Byzantine   = {}
    SubmitCap   = 6
    EnforceNonce = TRUE
    EnforceAuth  = TRUE

INVARIANT TypeOK
INVARIANT ChainLinearizable
INVARIANT OnlyAuthorizedCommitted
