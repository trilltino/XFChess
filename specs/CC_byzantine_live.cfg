\* Scope-completion: liveness UNDER a Byzantine peer (the existing liveness
\* config CC_honest_live only checks all-honest convergence). Peer A equivocates,
\* but with weak fairness and no permanent loss the honest peers' real move
\* streams must still converge — equivocations are rejected, they do not stall
\* delivery of legitimate moves.
\* RESULT: Convergence holds with Byzantine = {A}.
SPECIFICATION LiveSpec

CONSTANTS
    Agents      = {A, B}
    MaxSeq      = 3
    MaxContent  = 3
    Byzantine   = {A}
    CheckParent   = TRUE
    GenesisBypass = FALSE
    AuthBinding   = TRUE
    EnableAdversary = FALSE

PROPERTY Convergence
