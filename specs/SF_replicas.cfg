\* Gap C: redundant persistence. Four independent submitters (two players plus
\* two stateless replica VPS nodes R1, R2) all race to submit the same moves to
\* Solana, with a reordering mempool. No consensus protocol between them.
\* RESULT: ChainLinearizable holds — N redundant writers can never fork or
\* corrupt the committed log, because the strict nonce check de-duplicates them.
\* This is the safety argument for replacing the single-VPS SPOF with N replicas.
SPECIFICATION Spec

CONSTANTS
    Agents      = {A, B, R1, R2}
    MaxNonce    = 3
    MaxContent  = 2
    Byzantine   = {}
    SubmitCap   = 6
    EnforceNonce = TRUE

INVARIANT TypeOK
INVARIANT ChainLinearizable
