\* Scope-completion: BOTH P2P adversaries active at once on the fully-fixed
\* protocol. Peer A equivocates (Byzantine) AND a forging third node is on the
\* gossip topic (EnableAdversary) at the same time — the threat the per-adversary
\* configs (CC_byzantine_* and CC_impersonation_*) only ever exercise in isolation.
\* Fixes on: GenesisBypass = FALSE, AuthBinding = TRUE, equivocation guard on.
\* RESULT: every safety invariant holds — the fixed protocol withstands a
\* simultaneous equivocator + impersonator.
SPECIFICATION SafeSpec

CONSTANTS
    Agents      = {A, B}
    MaxSeq      = 2
    MaxContent  = 2
    Byzantine   = {A}
    CheckParent   = TRUE
    GenesisBypass = FALSE
    AuthBinding   = TRUE
    EnableAdversary = TRUE

CONSTRAINT NetBounded

INVARIANT TypeOK
INVARIANT NoFork
INVARIANT SeqMonotonic
INVARIANT NoEquivocationAccepted
INVARIANT OnlyAuthenticAccepted
