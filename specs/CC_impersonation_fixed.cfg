\* Gap A — impersonation, AFTER the fix (AuthBinding = TRUE).
\* Models bind_identity (agent_id := verified signer) + the roster check:
\* a forged message is bound to the adversary's own key, which is not a
\* participant, so it is rejected.
\* RESULT: OnlyAuthenticAccepted HOLDS — no forged move ever lands. Verifies
\* the fix closes the impersonation gap.
SPECIFICATION SafeSpec

CONSTANTS
    Agents      = {A, B}
    MaxSeq      = 2
    MaxContent  = 2
    Byzantine   = {}
    CheckParent   = TRUE
    GenesisBypass = FALSE
    AuthBinding   = TRUE
    EnableAdversary = TRUE

CONSTRAINT NetBounded

INVARIANT TypeOK
INVARIANT NoFork
INVARIANT SeqMonotonic
INVARIANT OnlyAuthenticAccepted
