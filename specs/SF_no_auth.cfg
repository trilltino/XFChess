\* Necessity proof for the authorization backstop: same outsider scenario as
\* SF_impersonation, but the session-key/roster check is REMOVED
\* (EnforceAuth = FALSE). The nonce check is still on, so the chain stays linear.
\* RESULT: OnlyAuthorizedCommitted is VIOLATED — the outsider E settles a move
\* on-chain. This shows the session_delegation roster check in record_move is
\* exactly what stops a forged P2P move from settling; the nonce check alone
\* does not (it only orders moves, it does not authenticate the submitter).
SPECIFICATION Spec

CONSTANTS
    Agents      = {A, B}
    Outsiders   = {E}
    Authorized  = {A, B}
    MaxNonce    = 3
    MaxContent  = 2
    Byzantine   = {}
    SubmitCap   = 6
    EnforceNonce = TRUE
    EnforceAuth  = FALSE

INVARIANT TypeOK
INVARIANT OnlyAuthorizedCommitted
