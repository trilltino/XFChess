\* Phase 1 + 3: two honest peers, network may reorder / drop / replay,
\* plus a forging adversary on the open topic. Current code (GenesisBypass),
\* with the auth fix on (AuthBinding).
\* Expect: all safety invariants hold; forged messages never land.
SPECIFICATION SafeSpec

CONSTANTS
    Agents      = {A, B}
    MaxSeq      = 3
    MaxContent  = 3
    Byzantine   = {}
    CheckParent   = TRUE
    GenesisBypass = TRUE
    AuthBinding   = TRUE
    EnableAdversary = FALSE

INVARIANT TypeOK
INVARIANT NoFork
INVARIANT SeqMonotonic
INVARIANT NoEquivocationAccepted
INVARIANT OnlyAuthenticAccepted
