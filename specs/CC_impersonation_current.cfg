\* Gap A — impersonation, BEFORE the fix (AuthBinding = FALSE).
\* Models the wire `agent_id` being trusted without binding to the signer.
\* A forging adversary on the open gossip topic injects a move under an honest
\* peer's identity.
\* RESULT: OnlyAuthenticAccepted is VIOLATED — the forged move is accepted as
\* if it came from the real participant. THIS IS THE GAP bind_identity closes.
SPECIFICATION SafeSpec

CONSTANTS
    Agents      = {A, B}
    MaxSeq      = 2
    MaxContent  = 2
    Byzantine   = {}
    CheckParent   = TRUE
    GenesisBypass = FALSE
    AuthBinding   = FALSE
    EnableAdversary = TRUE

INVARIANT TypeOK
INVARIANT OnlyAuthenticAccepted
