<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>XFChess</title>
    <script>
      // GitHub Pages SPA redirect — preserves the path for React Router
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') + l.hash)
      );
    </script>
  </head>
</html>
