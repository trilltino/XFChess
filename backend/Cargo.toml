[package]
name = "backend"
version = "0.1.0"
edition = "2021"



[lib]
name = "backend"
path = "src/lib.rs"

[[bin]]
name = "backend"
path = "src/main.rs"

[[bin]]
name = "signing-server"
path = "src/signing_server.rs"

[dependencies]
axum = "0.8.8"
tokio = { version = "1.49.0", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
argon2 = "0.5.3"
jsonwebtoken = { version = "10.3.0", features = ["rust_crypto"] }
chrono = { workspace = true, features = ["serde"] }
sqlx = { version = "0.8.6", features = [
    "runtime-tokio-native-tls",
    "sqlite",
    "uuid",
    "chrono",
] }
uuid = { workspace = true, features = ["v4", "serde"] }
shared = { path = "../crates/shared" }

rand = { workspace = true }
bevy = { workspace = true, features = [
    "multi_threaded",
    "bevy_asset",
    "bevy_scene",
    "bevy_winit",
] }
dotenv = "0.15.0"
bincode = { workspace = true }
base64 = "0.22.1"
sha2 = "0.10"
bs58 = "0.5"
anyhow = "1.0.75"

# Braid/Iroh dependencies
braid-iroh = { path = "../crates/braid-iroh" }
iroh-gossip = { path = "../crates/iroh-gossip" }
braid-core = { path = "../crates/braid-core" }
braid_uri = { path = "../crates/braid_uri" }

# Solana dependencies
solana-sdk = { workspace = true }
solana-client = { workspace = true }

[dev-dependencies]
serde_json = "1.0"
