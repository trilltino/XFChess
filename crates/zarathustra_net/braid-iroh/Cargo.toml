[package]
name = "braid-iroh"
version = "0.1.0"
edition = "2021"
publish = false

[features]
default = []
proxy = ["dep:axum", "dep:tower", "dep:tower-http", "dep:iroh-h3-axum", "dep:iroh-h3-client"]

[dependencies]
iroh = { workspace = true, features = ["test-utils"] }
n0-future = "0.3.2"
iroh-gossip = { path = "../iroh-gossip", features = ["net"] }

braid-core = { path = "../braid-core", features = ["client", "serde"] }

axum = { workspace = true, features = ["ws"], optional = true }
tower = { version = "0.5", optional = true }
tower-http = { workspace = true, features = ["cors", "trace", "fs"], optional = true }
iroh-h3-axum = { path = "../iroh-h3-axum", optional = true }
iroh-h3-client = { path = "../iroh-h3-client", optional = true }
http = "1"

tokio = { workspace = true }
tokio-stream = { version = "0.1", features = ["sync"] }
futures = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }
bytes = "1"

blake3 = "1"

tracing = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
rand = { workspace = true }

[dev-dependencies]
rand = { workspace = true }
