[package]
name = "braid-core"
version = "0.1.4"
edition = "2021"
publish = false

[features]
default = ["client", "serde", "native"]
# `native` pulls in the tokio runtime used by the default trait impls.
native = ["dep:tokio", "tokio?/full"]
# `client` / `serde` are kept as markers for downstream consumers (braid-iroh,
# backend) that request them explicitly. The heavy `server`, `fs`, `blob` and
# vendored-CRDT (`diamond-types`) features were removed — unused by XFChess.
client = ["serde"]
serde = []

[dependencies]
braid-http = { path = "../braid-http" }

thiserror = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
async-channel = "2.3"
bytes = { version = "1.11.1", features = ["serde"] }
serde_json = { workspace = true }

tokio = { workspace = true, optional = true }
