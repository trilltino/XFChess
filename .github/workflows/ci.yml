name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - name: Check
        run: cargo check --workspace --all-features

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings
        continue-on-error: true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - name: Run tests
        run: cargo test --workspace

  test-chess-engine:
    name: Chess Engine Tests (unit + perft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests (includes fast perft suite)
        run: cargo test -p nimzovich_engine
      - name: Deep perft (movegen correctness, release)
        run: cargo test -p nimzovich_engine --release --lib -- --ignored
      - name: Differential perft vs shakmaty reference
        run: cargo test -p nimzovich_engine --release --test differential_perft -- --ignored

  # Engine sanity match: 20 fast self-play games via cutechess-cli. Catches the
  # bug class unit tests cannot: illegal moves, protocol violations, crashes,
  # clock forfeits. Does NOT measure strength (that stays a local concern via
  # scripts/engine_match.bat against the Rustic ladder).
  engine-match-sanity:
    name: Engine Match Sanity (no forfeits)
    runs-on: ubuntu-latest
    needs: test-chess-engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build UCI adapter
        run: cargo build --release -p nimzovich-uci
      - name: Install cutechess-cli
        run: |
          wget -q https://github.com/cutechess/cutechess/releases/download/v1.4.0/cutechess-cli-1.4.0-linux64.tar.gz -O /tmp/cc.tar.gz
          tar -xzf /tmp/cc.tar.gz -C /tmp
          echo "CUTECHESS=$(find /tmp -name cutechess-cli -type f | head -1)" >> "$GITHUB_ENV"
      - name: Self-play 20 games
        run: |
          "$CUTECHESS" \
            -engine name=A cmd=target/release/nimzovich-uci proto=uci \
            -engine name=B cmd=target/release/nimzovich-uci proto=uci \
            -each tc=2+0.05 option.Hash=32 timemargin=300 \
            -rounds 10 -games 2 -repeat -concurrency 2 \
            -draw movenumber=60 movecount=8 score=10 \
            -resign movecount=5 score=700 \
            -pgnout /tmp/sanity.pgn | tee /tmp/match.log
      - name: Fail on forfeits (illegal moves, disconnects, time losses, stalls)
        run: |
          if grep -E "illegal move|disconnects|loses on time|stalls" /tmp/match.log; then
            echo "::error::Engine forfeited games — see match log above"
            exit 1
          fi
          echo "No forfeits in 20 games."

  test-shared:
    name: Shared Protocol Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - name: Test
        run: cargo test -p shared

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown -p xfchess
        continue-on-error: true

  # ── Security & supply chain (WS-F) ──────────────────────────────────────────
  # RustSec advisory scan. Informative first (large Solana/Iroh tree has advisories
  # without upstream fixes); flip continue-on-error → false once triaged to gate.
  cargo-audit:
    name: Security Audit (cargo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit Rust dependencies
        run: cargo audit
        continue-on-error: true

  # Web frontend: build gate + dependency audit (npm). Build is a hard gate; audit
  # is informative until triaged.
  web-ci:
    name: Web (build + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-solana
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
