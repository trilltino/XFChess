name: Deploy to VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xfchessdotcom/package-lock.json

      - name: Install dependencies
        run: cd xfchessdotcom && npm ci

      - name: Build
        run: cd xfchessdotcom && npm run build
        env:
          # Points to the same domain — nginx routes /api/* to the backend
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}

      - name: Upload frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "xfchessdotcom/dist/*"
          target: "/opt/xfchess/web"
          strip_components: 2

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      # Cache cargo registry + target so each deploy only rebuilds what changed
      # instead of every dependency from scratch.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: backend-release

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-x86-64-linux-gnu libssl-dev pkg-config musl-tools

      - name: Build backend (Linux)
        run: |
          cd backend
          cargo build --release --bin signing-server-http
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: x86_64-linux-gnu-gcc

      - name: Upload binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/target/release/signing-server-http"
          target: "/opt/xfchess"
          strip_components: 3

      - name: Restart backend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod +x /opt/xfchess/signing-server-http
            systemctl restart xfchess-backend
