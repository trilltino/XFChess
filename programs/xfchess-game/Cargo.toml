[package]
name = "xfchess-game"
version = "0.1.0"
description = "Created with Anchor"
edition = "2021"
autotests = false

[lib]
crate-type = ["cdylib", "lib"]
name = "xfchess_game"

[features]
default = ["cranks"]
idl-build = ["anchor-spl/idl-build"]
move-validation = ["chess-logic-on-chain"]
cranks = ["magicblock-magic-program-api", "bincode"]
game-tests = []
legacy-game-tests = []

[dependencies]
anchor-lang = { version = "=0.31.1", features = ["init-if-needed"] }
anchor-spl = "=0.31.1"
solana-program = "=2.2.1"
# solana-program version pulled in by anchor-lang
chess-logic-on-chain = { workspace = true, features = ["alloc"], optional = true }
ephemeral-rollups-sdk = { path = "../../references/ephemeral-rollups-sdk/rust/sdk", default-features = false, features = ["anchor"] }
# borsh = { version = "0.10", features = ["alloc"] }

# Crank dependencies (MagicBlock scheduled tasks) — gated by the `cranks` feature
magicblock-magic-program-api = { version = "=0.3.1", default-features = false, optional = true }
bincode = { version = "=1.3", optional = true }

[[test]]
name = "game_tests"
path = "tests/game_tests.rs"
required-features = ["legacy-game-tests"]

[[test]]
name = "security_tests"
path = "tests/security_tests.rs"
required-features = ["legacy-game-tests"]

[[test]]
name = "fee_model_tests"
path = "tests/fee_model_tests.rs"
required-features = ["legacy-game-tests"]

[[test]]
name = "smoke_tests"
path = "tests/smoke_tests.rs"
required-features = ["game-tests"]

[dev-dependencies]
tokio = { version = "=1", features = ["full"] }
solana-program-test = "=2.2.1"
solana-sdk = "=2.2.1"

[lints.rust]
unexpected_cfgs = { level = "allow" }
