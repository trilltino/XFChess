[package]
name = "xfchess-game"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "xfchess_game"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
# magicblock = ["ephemeral-rollups-sdk"]
move-validation = ["shakmaty"]
default = ["move-validation"]
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = "0.32.1"
anchor-spl = "0.32.1"
# solana-program version pulled in by anchor-lang
shakmaty = { version = "0.30.0", default-features = false, features = [
    "alloc",
], optional = true }
# ephemeral-rollups-sdk = { path = "../../references/ephemeral-rollups-sdk/rust/sdk", optional = true }




[dev-dependencies]
solana-program-test = "2.2.1"
solana-sdk = "2.2.1"
tokio = "1.49.0"