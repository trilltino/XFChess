version: '3.8'

services:
  xfchess:
    build:
      context: ..
      dockerfile: releases/Dockerfile
    container_name: xfchess-iroh
    ports:
      - "5001:5001"  # P2P networking port
    volumes:
      - ./sessions:/home/xfchess/sessions  # Persist session files
      - ./logs:/home/xfchess/logs          # Persist logs
    environment:
      - DISPLAY=host.docker.internal:0  # For X11 forwarding (Linux/macOS)
    restart: unless-stopped
    stdin_open: true  # Keep STDIN open for interactive use
    tty: true         # Allocate a TTY
    
  # Optional: Add a simple nginx reverse proxy for web interface
  nginx:
    image: nginx:alpine
    container_name: xfchess-web
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - xfchess
    profiles:
      - web  # Only start with --profile web
