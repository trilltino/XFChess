name: Build and Release XFChess

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build:
    name: Build XFChess for ${{ matrix.target_os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact_name: XFChess-Iroh.exe
            asset_name: XFChess-Iroh-Windows-x64-${{ github.event.inputs.version || '0.1.0' }}.zip
            asset_content_type: application/zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: xfchess
            asset_name: XFChess-Iroh-Linux-x64-${{ github.event.inputs.version || '0.1.0' }}.tar.gz
            asset_content_type: application/gzip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: xfchess
            asset_name: XFChess-Iroh-macOS-x64-${{ github.event.inputs.version || '0.1.0' }}.tar.gz
            asset_content_type: application/gzip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: xfchess
            asset_name: XFChess-Iroh-macOS-ARM64-${{ github.event.inputs.version || '0.1.0' }}.tar.gz
            asset_content_type: application/gzip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }} --bin xfchess

    - name: Prepare release directory
      run: |
        mkdir -p release
        cp -r assets release/
        cp releases/README.md release/

    - name: Copy executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cp target/${{ matrix.target }}/release/xfchess.exe release/XFChess-Iroh.exe
        cp releases/Start-XFChess.bat release/

    - name: Copy executable (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cp target/${{ matrix.target }}/release/xfchess release/xfchess
        chmod +x release/xfchess
        cat > release/start-xfchess.sh << 'EOF'
        #!/bin/bash
        echo "🎮 XFChess - Iroh Networking Version"
        echo ""
        echo "Choose game mode:"
        echo "1. Single Player (vs AI)"
        echo "2. Multiplayer - Host Game"
        echo "3. Multiplayer - Join Game"
        echo "4. Load Session File"
        echo ""
        read -p "Enter your choice (1-4): " choice

        case $choice in
            1)
                echo "🤖 Starting single player game..."
                ./xfchess play --player-color white
                ;;
            2)
                echo "🏠 Starting multiplayer host..."
                echo "📝 Share your node ID with your opponent when it appears."
                ./xfchess play --player-color white --p2p-port 5001
                ;;
            3)
                read -p "🔗 Enter host's node ID: " nodeid
                echo "🔌 Connecting to host..."
                ./xfchess play --player-color black --bootstrap-node "$nodeid"
                ;;
            4)
                read -p "📁 Enter session file path: " sessionfile
                echo "📂 Loading session..."
                ./xfchess --session-config "$sessionfile"
                ;;
            *)
                echo "❌ Invalid choice. Please run again."
                exit 1
                ;;
        esac
        EOF
        chmod +x release/start-xfchess.sh

    - name: Create archive (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd release
        7z a -tzip ../${{ matrix.asset_name }} .

    - name: Create archive (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd release
        tar -czf ../${{ matrix.asset_name }} .

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.target }}
        path: ${{ matrix.asset_name }}

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ matrix.asset_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: trilltino/xfchess-iroh
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./releases/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
