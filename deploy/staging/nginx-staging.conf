# XFChess STAGING nginx server block.
# Drop into /etc/nginx/sites-available/xfchess-staging (or conf.d/) on the VPS and
# point staging.<your-domain> at it. Proxies to the staging backend on :8091.
# Get a cert: certbot --nginx -d staging.<your-domain>

server {
    listen 443 ssl;
    server_name staging.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/staging.YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # Optional: keep search engines off staging.
    add_header X-Robots-Tag "noindex, nofollow" always;
    client_max_body_size 1m;

    root /opt/xfchess-staging/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend + game endpoints → staging backend on 8091.
    location ~ ^/(api|session|move|game|auth|ws|health|readyz)(/|$) {
        proxy_pass         http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ~ /\. { deny all; }
}
