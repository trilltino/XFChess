# XFChess nginx configuration — HTTP-ONLY variant (no TLS, no HTTPS redirect)
#
# This is what runs on the IP-only deployment (http://178.104.55.19/) until a
# real domain + certificate is provisioned. It mirrors the route coverage and
# rate limiting of the canonical deploy/nginx/nginx.conf but serves everything
# on port 80 with no `listen 443`/`ssl_*` and no 80→443 redirect.
#
# To switch to HTTPS later: point a domain at the server and run
#   deploy\scripts\deploy.ps1 -Domain your.domain
# which installs the canonical nginx.conf (TLS + redirect) and a Let's Encrypt cert.
#
# Rate-limit zones (signing/moves/auth/mail/api) are declared in
# /etc/nginx/conf.d/xfchess_rate_limit.conf — that file MUST be present or nginx
# will fail to load because the `limit_req zone=…` directives below reference it.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Security headers (no HSTS — that header is only meaningful over HTTPS).
    server_tokens off;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    # CSP in report-only first — wallet SDKs inject scripts + open RPC/WS conns.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'" always;
    client_max_body_size 1m;

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    root /opt/xfchess/web;
    index index.html;

    # ── Admin API is NEVER served publicly ────────────────────────────────────
    # Operators reach /admin/* via an SSH tunnel straight to 127.0.0.1:8090
    # (ssh -L 8091:127.0.0.1:8090). 444 closes the connection with no response.
    # Must sit above `location /` to beat the SPA try_files fallback.
    location /admin/ {
        return 444;
    }

    # ── Email endpoints — tight rate limit (abuse/disk guard) ─────────────────
    location = /api/signup {
        limit_req zone=mail burst=2 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/waitlist {
        limit_req zone=mail burst=2 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Auth endpoints — brute-force guard ────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API (reverse proxy to Axum on port 8090) ─────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Game session signing (native client → /session/sign) — rate limited ───
    location /session/ {
        limit_req zone=signing burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Game move recording (native client → /move/record) — rate limited ─────
    location /move/ {
        limit_req zone=moves burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Game session create / finalize / status ───────────────────────────────
    location /game/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health / readiness (deploy verify + uptime monitors) ──────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host $host;
    }
    location = /readyz {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host $host;
    }

    location /ws {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
    }

    # ── SPA fallback (must stay last among location / matches) ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
