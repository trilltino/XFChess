# XFChess nginx configuration
# Rate-limit zones are declared in /etc/nginx/conf.d/xfchess_rate_limit.conf
# (uploaded by deploy.ps1 to the http context)
#
# SSL certificates: managed by certbot (`certbot --nginx -d YOUR_DOMAIN`)
# For IP-only deployments, deploy.ps1 generates a self-signed cert at
#   /etc/ssl/xfchess/selfsigned.{crt,key}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    # Allow certbot ACME challenges through before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl default_server;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # TLS hardening
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Security headers
    server_tokens off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    # CSP in report-only first — wallet SDKs inject scripts + open RPC/WS conns.
    # Watch console reports, then switch to enforcing (drop "-Report-Only").
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'" always;
    client_max_body_size 1m;

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    root /opt/xfchess/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Admin API is NEVER served publicly ────────────────────────────────────
    # Operators reach /admin/* via an SSH tunnel straight to 127.0.0.1:8090
    # (ssh -L 8091:127.0.0.1:8090). 444 closes the connection with no response,
    # so this must sit above `location /` to beat the SPA try_files fallback.
    location /admin/ {
        return 444;
    }

    # ── Email endpoints — tight rate limit (abuse/disk guard) ─────────────────
    location = /api/signup {
        limit_req zone=mail burst=2 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/waitlist {
        limit_req zone=mail burst=2 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Auth endpoints — brute-force guard ────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API (reverse proxy to Axum on port 8090) ─────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Game session signing (native client → /session/sign) — rate limited ───
    location /session/ {
        limit_req zone=signing burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Game move recording (native client → /move/record) — rate limited ─────
    location /move/ {
        limit_req zone=moves burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Game session create / finalize / status ───────────────────────────────
    location /game/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health / readiness (deploy verify + uptime monitors) ──────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host $host;
    }
    location = /readyz {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host $host;
    }

    location /ws {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
