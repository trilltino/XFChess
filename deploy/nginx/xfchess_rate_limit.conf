# Rate-limiting zones for XFChess — included in nginx http context
# Deploy: upload to /etc/nginx/conf.d/xfchess_rate_limit.conf
#
# signing: 10 req/min per IP for /api/sign/* (Solana tx signing)
# moves:   60 req/min per IP for /api/move/* (chess moves)
limit_req_zone $binary_remote_addr zone=signing:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=moves:10m   rate=60r/m;
