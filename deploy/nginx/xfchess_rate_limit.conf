# Rate-limiting zones for XFChess — included in nginx http context
# Deploy: upload to /etc/nginx/conf.d/xfchess_rate_limit.conf
#
# signing: 10 req/min per IP for /session/* (Solana session tx signing)
# moves:   60 req/min per IP for /move/*    (chess moves)
# auth:    10 req/min per IP for /api/auth/* (login/register — brute force guard)
# mail:     3 req/min per IP for signup + waitlist (email/disk abuse guard)
# api:    120 req/min per IP general /api/* fallback
limit_req_zone $binary_remote_addr zone=signing:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=moves:10m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=mail:10m    rate=3r/m;
limit_req_zone $binary_remote_addr zone=api:10m     rate=120r/m;
