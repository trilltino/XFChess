# Prometheus configuration for XFChess monitoring
# Scrapes metrics from the backend application

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape XFChess backend
  # Assumes backend exposes /metrics endpoint on port 8090
  - job_name: "xfchess-backend"
    static_configs:
      - targets: ["host.docker.internal:8090"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Scrape node exporter (system metrics)
  # Install node-exporter on host for detailed system metrics
  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
