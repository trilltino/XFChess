<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Wallet - XFChess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #08080c;
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }
        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(220, 140, 60, 0.2);
            border-top-color: #dc8c3c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #wallet-frame {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading wallet...</p>
    </div>
    <iframe id="wallet-frame" style="display:none;"></iframe>
    <script>
        const port = window.location.port || '7454';
        const walletUrl = 'http://localhost:' + port + '/onboard?step=connect_wallet';
        const frame = document.getElementById('wallet-frame');
        const loading = document.getElementById('loading');
        
        frame.src = walletUrl;
        frame.onload = function() {
            loading.style.display = 'none';
            frame.style.display = 'block';
        };
        
        // Handle messages from the wallet UI
        window.addEventListener('message', function(event) {
            if (event.data === 'wallet-connected') {
                // Close popup after wallet connection
                setTimeout(function() {
                    if (window.__TAURI__) {
                        window.close();
                    }
                }, 500);
            }
        });
    </script>
</body>
</html>
