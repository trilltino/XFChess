# Prometheus configuration for local development
# Scrapes metrics from backend running on localhost

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape XFChess backend (local)
  - job_name: "xfchess-backend"
    static_configs:
      - targets: ["host.docker.internal:8090"]
    metrics_path: "/metrics"
    scrape_interval: 15s
