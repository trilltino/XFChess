[package]
name = "xfchess-tauri"
version = "0.1.0"
edition = "2021"
description = "XFChess Tauri wrapper — wallet adapter + native game launcher"

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-build = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[build-dependencies]
tauri-build = { version = "2", features = [] }
