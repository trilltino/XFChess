[package]
name = "xfchess-viz"
version = "0.1.0"
description = "XFChess Network Visualiser — Triton RPC benchmark + topology"
edition = "2021"
rust-version = "1.77.2"

# Standalone app — excluded from the root workspace (see root Cargo.toml).
[[bin]]
name = "xfchess-viz"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2.11", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
reqwest = { version = "0.12", features = ["json"] }

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
panic = "abort"
